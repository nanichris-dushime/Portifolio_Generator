<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <h1>Portfolio Generator</h1>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Form Section -->
            <div id="formSection" class="form-section">
                <h2>Create Your Portfolio</h2>
                <form id="portfolioForm">
                    <!-- Personal Info -->
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="sector">Sector / Industry *</label>
                        <select id="sector" name="sector" required>
                            <option value="">Select a sector</option>
                            <option value="Technology">Technology</option>
                            <option value="Design">Design & UX</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Finance">Finance</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Agriculture">Agriculture</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <!-- Photo Upload -->
                    <div class="form-group">
                        <label for="photo">Profile Photo</label>
                        <input type="file" id="photo" name="photo" accept="image/*">
                        <div id="photoPreview" class="photo-preview"></div>
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label for="description">Professional Description *</label>
                        <textarea id="description" name="description" rows="4" placeholder="Tell us about yourself..." required></textarea>
                    </div>

                    <!-- CV -->
                    <div class="form-group">
                        <label for="cv">Your CV / Experience</label>
                        <textarea id="cv" name="cv" rows="4" placeholder="Paste your CV or describe your experience..."></textarea>
                    </div>

                    <!-- Projects Section -->
                    <div class="form-group">
                        <h3>Projects You're Working On</h3>
                        <div id="projectsContainer">
                            <div class="project-item">
                                <input type="text" class="project-name" placeholder="Project Name">
                                <textarea class="project-description" rows="2" placeholder="Project Description"></textarea>
                            </div>
                        </div>
                        <button type="button" id="addProjectBtn" class="btn-secondary">+ Add Another Project</button>
                    </div>

                    <!-- Submit -->
                    <div class="form-actions">
                        <button type="submit" id="generateBtn" class="btn-primary">Generate Portfolio</button>
                        <button type="reset" class="btn-secondary">Clear Form</button>
                    </div>
                </form>
            </div>

            <!-- Portfolio Display Section -->
            <div id="portfolioSection" class="portfolio-section" style="display: none;">
                <button id="backBtn" class="btn-back">← Back to Form</button>
                
                <div class="portfolio-container">
                    <div id="portfolioContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
